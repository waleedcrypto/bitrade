{% extends "layout.html" %}
{% block content %}
<div class="glass-card p-6 mb-6">
    <p class="text-gray-400 text-xs uppercase">Accumulated Earnings</p>
    <h2 class="text-4xl font-extrabold neon-text mt-1">$0.0000</h2>
</div>

<div class="grid grid-cols-2 gap-4 mb-8">
    <button onclick="document.getElementById('modal').style.display='flex'" class="neon-btn py-4 rounded-2xl">Deposit</button>
    <button class="bg-[#1f2229] py-4 rounded-2xl">Withdraw</button>
</div>

<h3 class="font-bold mb-4">Investment Plans</h3>
<div class="glass-card p-5 border-l-4 border-green-500 mb-4">
    <div class="flex justify-between">
        <span class="font-bold text-lg">Basic Plan</span>
        <span class="neon-text font-bold">$10+</span>
    </div>
    <button onclick="document.getElementById('modal').style.display='flex'" class="w-full bg-[#1f2229] mt-4 py-2 rounded-xl text-xs font-bold">STAKE NOW</button>
</div>

{% for p in user.plans %}
<div class="glass-card p-4 mt-4 border-l-4 border-blue-500">
    <p class="text-xs text-gray-400 uppercase">Ends In:</p>
    <p class="text-xl font-mono countdown" data-end="{{ p.end_time }}">--:--:--</p>
</div>
{% endfor %}

<div id="modal" class="fixed inset-0 bg-black/95 hidden items-center justify-center p-6 z-50">
    <div class="glass-card p-8 w-full text-center">
        <h3 class="text-xl font-bold mb-4">Deposit USDT</h3>
        <p class="text-[10px] bg-black p-3 rounded-lg mb-4 break-all">{{ admin_wallet }}</p>
        <input type="text" id="txid" placeholder="TXID" class="w-full p-4 rounded-xl mb-3">
        <input type="number" id="amt" placeholder="Amount" class="w-full p-4 rounded-xl mb-6">
        <button onclick="submitDeposit()" class="neon-btn w-full py-4 rounded-xl">SUBMIT</button>
        <button onclick="document.getElementById('modal').style.display='none'" class="mt-4 text-xs">Close</button>
    </div>
</div>

<script>
async function submitDeposit() {
    const txid = document.getElementById('txid').value;
    const amount = document.getElementById('amt').value;
    await fetch('/submit_dep', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({txid, amount, plan: 'Basic'})
    });
    alert("Deposit Received!");
    location.reload();
}
</script>
{% endblock %}
